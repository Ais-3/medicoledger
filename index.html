<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Personal Ledger</title>
<meta name="description" content="Finance, university, and PARA — one offline binder." />

<!-- PWA -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#2F5D4F" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />

<!-- Tailwind (utility classes used throughout the app) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Resolve bare imports in the app module to CDN builds, deduped on React -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
  }
}
</script>

<style>
  html, body { background: #EFEBE1; margin: 0; }
  #boot-fallback {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: ui-sans-serif, system-ui, sans-serif; color: #8A8672; font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"><div id="boot-fallback">Loading your ledger…</div></div>

<!-- On-device storage shim, must load before the app module -->
<script src="./storage-shim.js"></script>

<!-- Babel: transpiles the app's JSX in-browser, no build step required -->
<script type="module">
import { createRoot } from "react-dom/client";
import React from "react";
import Binder from "./app.js";

const root = createRoot(document.getElementById("root"));
root.render(React.createElement(Binder));
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const registration = await navigator.serviceWorker.register("./sw.js");

      // Check immediately for updates
      registration.update();

      // Check every minute
      setInterval(() => {
        registration.update();
      }, 60000);

      console.log("Service Worker registered");
    } catch (err) {
      console.error("Service Worker registration failed:", err);
    }
  });
}
</script>
</body>
</html>
