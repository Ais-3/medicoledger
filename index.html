<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Personal Ledger (b6)</title>
<meta name="description" content="Finance, university, and PARA — one offline binder." />

<!-- PWA -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#2F5D4F" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />

<!-- Tailwind (utility classes used throughout the app) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React, loaded the old reliable way: plain global scripts, no ESM/CORS
     resolution needed for the one dependency the whole app rests on. -->
<script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<!-- Only lucide-react (icons — cosmetic, has a graceful fallback) resolves
     via CDN ESM. React itself resolves to local shims over the globals above. -->
<script type="importmap">
{
  "imports": {
    "react": "./react-shim.js",
    "react-dom/client": "./react-dom-client-shim.js",
    "lucide-react": "./lucide-shim.js"
  }
}
</script>

<style>
  html, body { background: #EFEBE1; margin: 0; }
  #boot-fallback {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: ui-sans-serif, system-ui, sans-serif; color: #8A8672; font-size: 14px;
  }
  #boot-error {
    display: none; min-height: 100vh; padding: 24px; box-sizing: border-box;
    font-family: ui-monospace, monospace; color: #9C4A32; background: #F4E3DC;
    white-space: pre-wrap; font-size: 13px; line-height: 1.5;
  }
</style>
</head>
<body>
<div id="root"><div id="boot-fallback">Loading your ledger… (build b6)</div></div>
<div id="boot-error"></div>

<script>
  var __booted = false;
  function showBootError(message) {
    var el = document.getElementById("boot-error");
    var root = document.getElementById("root");
    if (root) root.style.display = "none";
    if (el) {
      el.style.display = "block";
      el.textContent = "Something went wrong loading the app (build b6):\n\n" + message +
        "\n\nTry: reload the page, or open it in a private/incognito window. " +
        "If it keeps happening, screenshot this whole box (the build number " +
        "at the top matters) and send it back.";
    }
  }
  window.addEventListener("error", function (e) {
    showBootError((e && e.message) || "Unknown script error (no further detail was provided by the browser).");
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason;
    showBootError((r && (r.stack || r.message)) || String(r));
  });
  // Watchdog: if nothing has rendered within 12s, something hung (not just
  // failed) — a stalled request otherwise leaves a spinner forever with no
  // signal at all, which looks identical to "still working."
  setTimeout(function () {
    if (!__booted) {
      showBootError(
        "The app is taking much longer than normal to load (over 12 seconds), " +
        "which usually means a network request stalled without failing outright.\n\n" +
        "This is most often internet connectivity, not the app itself."
      );
    }
  }, 12000);
</script>

<!-- On-device storage shim, must load before the app module -->
<script src="./storage-shim.js"></script>

<script type="module">
(async () => {
  const CURRENT_BUILD = "b6";
  try {
    // Self-heal ONLY when this build is new to this device — clearing on
    // every load would break normal offline use. This is what fixes
    // "I keep seeing the old version": a stuck worker from a previous
    // build gets forcibly cleared out the first time a new build loads.
    let lastSeenBuild = null;
    try { lastSeenBuild = localStorage.getItem("ledger-build-seen"); } catch (e) {}

    if (lastSeenBuild !== CURRENT_BUILD) {
      if ("serviceWorker" in navigator) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        } catch (e) { /* non-fatal */ }
      }
      if (window.caches && caches.keys) {
        try {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        } catch (e) { /* non-fatal */ }
      }
      try { localStorage.setItem("ledger-build-seen", CURRENT_BUILD); } catch (e) {}
    }

    if (!window.React || !window.ReactDOM) {
      throw new Error("React failed to load from the CDN script tags (unpkg). Check your connection and reload.");
    }
    const [{ createRoot }, AppMod] = await Promise.all([
      import("react-dom/client"),
      import("./app.js"),
    ]);
    const Binder = AppMod.default;
    const root = createRoot(document.getElementById("root"));
    root.render(window.React.createElement(Binder));
    __booted = true;

    // Only cache a version of the app once it has actually rendered
    // successfully — never let a broken build get cached for offline use.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" }).catch((e) => {
        console.warn("Service worker registration failed (app still works, just won't cache for offline yet):", e);
      });
    }
  } catch (err) {
    showBootError((err && (err.stack || err.message)) || String(err));
  }
})();
</script>
</body>
</html>
